<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频集</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 2rem;
        }
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .back {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            display: inline-block;
            margin-bottom: 2rem;
        }
        .back:hover { color: #ccc; }
        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-item {
            background: #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 225px;
            object-fit: cover;
        }
        .video-item p {
            padding: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back"><i class="fas fa-arrow-left"></i> 返回首页</a>
    <header>
        <h1>我的视频</h1>
        <p>分享精彩瞬间</p>
    </header>
    <div class="video-list" id="videoList"></div>

    <script src="config.js"></script>
    <script>
        const videoList=document.getElementById("videoList");
        config.videos.forEach((url, index) => {
            const item=document.createElement("div");
            item.className = "video-item";
            item.innerHTML = `
                <video controls>
                    <source src="${url}" type="video/mp4">
                    你的浏览器不支持视频播放
                </video>
                <p>视频 ${index + 1}</p>
            `;
            videoList.appendChild(item);
        });
    </script>
</body>
</html>
