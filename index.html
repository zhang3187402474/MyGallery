<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: url("") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }
        .container {
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            margin-bottom: 1.5rem;
            object-fit: cover;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 2rem;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }
        .nav {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        .nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.8rem 2rem;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <img src="" alt="头像" class="avatar" id="avatar">
        <h1 id="name">你的昵称</h1>
        <p id="bio">简约介绍你的信息，自定义文字内容。</p>
        <div class="nav">
            <a href="photo.html"><i class="fas fa-images"></i> 照片</a>
            <a href="video.html"><i class="fas fa-video"></i> 视频</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // 应用配置
        document.body.style.backgroundImage = `url(${config.background})`;
        document.getElementById("avatar").src = config.avatar;
        document.getElementById("name").textContent = config.name;
        document.getElementById("bio").textContent = config.bio;
    </script>
</body>
</html>
